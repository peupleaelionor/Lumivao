<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LUMIVAO">
  <!-- Carré ouvert = la vitrine / le support -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="#121212"/>
