name: Deploy to Vercel

# Déploiement automatique :
# - push sur main           -> déploiement PRODUCTION
# - push sur une autre branche -> déploiement PREVIEW (URL de test)
#
# Secrets requis (Repo → Settings → Secrets and variables → Actions) :
#   VERCEL_TOKEN        (vercel.com/account/tokens)
#   VERCEL_ORG_ID       (.vercel/project.json après `vercel link`)
#   VERCEL_PROJECT_ID   (.vercel/project.json après `vercel link`)

on:
  push:
    branches:
      - main
      - "claude/**"

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "target=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel env
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
